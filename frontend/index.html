<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="UrbanPulse Coruña - Dashboard de monitorización ambiental urbana profesional">
    <title>UrbanPulse Coruña - Dashboard Ambiental</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    
    <!-- Styles -->
    <link rel="stylesheet" href="./css/theme.css">
</head>
<body>
    <div id="app">
        <!-- Header con búsqueda -->
        <header class="app-header">
            <div class="header-content">
                <h1 class="logo">🌍 UrbanPulse</h1>
                
                <div class="search-container">
                    <input 
                        type="text" 
                        class="search-input" 
                        id="search-zones"
                        placeholder="Buscar zonas (ej: Ronda de Outeiro, Cuatro Caminos)"
                    >
                </div>

                <div class="header-controls">
                    <span class="status-indicator" id="connection-status" title="Estado de conexión"></span>
                </div>
            </div>
        </header>

        <!-- Main Container -->
        <div class="main-container">
            <!-- Sidebar -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-title">Navegación</div>
                    <button class="nav-item active" data-page="dashboard">
                        <span class="nav-icon">📊</span>
                        <span>Dashboard</span>
                    </button>
                    <button class="nav-item" data-page="traffic">
                        <span class="nav-icon">🚗</span>
                        <span>Tráfico</span>
                    </button>
                    <button class="nav-item" data-page="air">
                        <span class="nav-icon">💨</span>
                        <span>Calidad del Aire</span>
                    </button>
                    <button class="nav-item" data-page="noise">
                        <span class="nav-icon">🔊</span>
                        <span>Ruido</span>
                    </button>
                    <button class="nav-item" data-page="forecast">
                        <span class="nav-icon">🔮</span>
                        <span>Predicciones</span>
                    </button>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-title">Servicios</div>
                    <button class="nav-item" data-page="greenroute">
                        <span class="nav-icon">🚴</span>
                        <span>GreenRoute</span>
                    </button>
                    <button class="nav-item" data-page="ecozones">
                        <span class="nav-icon">🌱</span>
                        <span>EcoZones</span>
                    </button>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-title">Panel IA</div>
                    <div id="llm-panel-sidebar" style="padding: 12px; background: linear-gradient(135deg, rgba(74, 144, 164, 0.1) 0%, transparent 100%); border-radius: 8px; margin: 0 4px;">
                        <p style="font-size: 13px; color: var(--text-light); margin-bottom: 8px;">💡 Explicaciones IA</p>
                        <p id="llm-content-sidebar" style="font-size: 12px; color: var(--text-secondary); line-height: 1.4;">
                            Selecciona un sensor para obtener explicaciones personalizadas.
                        </p>
                    </div>
                </div>
            </aside>

            <!-- Content Area -->
            <div class="content-area">
                <div class="content-wrapper" id="content-wrapper">
                    <!-- Map -->
                    <div class="map-container" id="map"></div>

                    <!-- Right Panel - Sensores y Métricas -->
                    <div class="right-panel" id="sensors-panel">
                        <!-- Sensores cargados dinámicamente -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.min.js"></script>

    <!-- Application scripts - Componentes modulares -->
    <script type="module">
        import { initializeApp } from './js/app-new.js';
        document.addEventListener('DOMContentLoaded', initializeApp);
    </script>
</body>
</html>
