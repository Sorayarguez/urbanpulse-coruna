services:
  mongo-db:
    image: mongo:${MONGO_VERSION:-6.0}
    container_name: urbanpulse-mongo-db
    command: --nojournal
    restart: unless-stopped
    ports:
      - "${MONGO_DB_PORT:-27017}:27017"
    volumes:
      - mongo-db-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - urbanpulse-net

  orion-ld:
    image: fiware/orion-ld:latest
    container_name: urbanpulse-orion-ld
    depends_on:
      mongo-db:
        condition: service_healthy
    command: -dbhost mongo-db -logLevel DEBUG
    restart: unless-stopped
    ports:
      - "${ORION_LD_PORT:-1026}:1026"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:1026/version >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - urbanpulse-net

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: urbanpulse-mosquitto
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'echo > /dev/tcp/localhost/1883'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - urbanpulse-net

  iot-agent-json:
    image: fiware/iotagent-json:latest
    container_name: urbanpulse-iot-agent-json
    depends_on:
      mongo-db:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      orion-ld:
        condition: service_healthy
    environment:
      - IOTA_CB_HOST=orion-ld
      - IOTA_CB_PORT=1026
      - IOTA_NORTH_PORT=4041
      - IOTA_REGISTRY_TYPE=mongodb
      - IOTA_MONGO_HOST=mongo-db
      - IOTA_MONGO_PORT=27017
      - IOTA_MONGO_DB=iotagentjson
      - IOTA_MQTT_HOST=mosquitto
      - IOTA_MQTT_PORT=1883
      - IOTA_HTTP_PORT=7896
      - IOTA_LOG_LEVEL=DEBUG
    restart: unless-stopped
    ports:
      - "${IOTA_NORTH_PORT:-4041}:4041"
      - "${IOTA_HTTP_PORT:-7896}:7896"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4041/iot/about >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s
    networks:
      - urbanpulse-net

  iot-agent-json-ld:
    image: fiware/iotagent-json:latest
    container_name: urbanpulse-iot-agent-json-ld
    depends_on:
      mongo-db:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      orion-ld:
        condition: service_healthy
    environment:
      - IOTA_CB_HOST=orion-ld
      - IOTA_CB_PORT=1026
      - IOTA_NORTH_PORT=4042
      - IOTA_REGISTRY_TYPE=mongodb
      - IOTA_MONGO_HOST=mongo-db
      - IOTA_MONGO_PORT=27017
      - IOTA_MONGO_DB=iotagentjsonld
      - IOTA_MQTT_HOST=mosquitto
      - IOTA_MQTT_PORT=1883
      - IOTA_HTTP_PORT=7897
      - IOTA_LOG_LEVEL=DEBUG
    restart: unless-stopped
    ports:
      - "${IOTA_NORTH_PORT_LD:-4042}:4042"
      - "${IOTA_HTTP_PORT_LD:-7897}:7897"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4042/iot/about >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s
    networks:
      - urbanpulse-net

  crate-db:
    image: crate:${CRATE_VERSION:-latest}
    container_name: urbanpulse-crate-db
    restart: unless-stopped
    ports:
      - "${CRATE_HTTP_PORT:-4200}:4200"
      - "${CRATE_PSQL_PORT:-5432}:5432"
    command: crate -Cdiscovery.type=single-node
    volumes:
      - crate-db-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4200 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 35s
    networks:
      - urbanpulse-net

  quantumleap:
    image: fiware/quantumleap:${QUANTUMLEAP_VERSION:-latest}
    container_name: urbanpulse-quantumleap
    depends_on:
      crate-db:
        condition: service_healthy
      orion-ld:
        condition: service_healthy
    environment:
      - CRATE_HOST=crate-db
      - CRATE_PORT=5432
      - QL_LOGLEVEL=DEBUG
    restart: unless-stopped
    ports:
      - "${QUANTUMLEAP_PORT:-8668}:8668"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8668/version >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s
    networks:
      - urbanpulse-net

  grafana:
    image: grafana/grafana-oss:${GRAFANA_VERSION:-latest}
    container_name: urbanpulse-grafana
    depends_on:
      crate-db:
        condition: service_healthy
      quantumleap:
        condition: service_healthy
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - urbanpulse-net

volumes:
  mongo-db-data:
  crate-db-data:
  grafana-data:

networks:
  urbanpulse-net:
    driver: bridge
